<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z AI Agent</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="header-title">Z AI Agent</span>
    </div>
    <div class="header-right">
      <div class="model-badge">
        <select id="modelSelect" class="model-select">
          <option value="glm-5.1">GLM-5.1</option>
          <option value="glm-5-turbo">Turbo</option>
          <option value="glm-5">GLM-5</option>
          <option value="glm-4.5">GLM-4.5</option>
          <option value="glm-4.5-flash">Flash</option>
          <option value="glm-4.5-air">Air</option>
        </select>
      </div>
      <button class="icon-btn" id="scheduleBtn" title="Scheduled tasks">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      </button>
      <button class="icon-btn" id="clearBtn" title="New conversation">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 4.3c.4-1.8 2.9-1.8 3.4 0a1.7 1.7 0 002.6 1.1c1.5-.9 3.3.8 2.4 2.4a1.7 1.7 0 001 2.6c1.8.4 1.8 2.9 0 3.4a1.7 1.7 0 00-1 2.6c.9 1.5-.9 3.3-2.4 2.4a1.7 1.7 0 00-2.6 1c-.4 1.8-2.9 1.8-3.4 0a1.7 1.7 0 00-2.6-1c-1.5.9-3.3-.9-2.4-2.4a1.7 1.7 0 00-1-2.6c-1.8-.4-1.8-2.9 0-3.4a1.7 1.7 0 001-2.6C4.4 6 6 4.3 7.6 5.1a1.7 1.7 0 002.6-1z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <!-- Status Bar -->
  <div class="status-bar">
    <div id="status" class="status">
      <span class="status-dot"></span>
      <span class="status-text">Ready</span>
    </div>
    <div class="tab-chip" id="tabBar">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
      <span id="tabLabel">Current tab</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-logo">
        <span class="welcome-letter">Z</span>
        <div class="welcome-glow"></div>
      </div>
      <h2>What would you like me to do?</h2>
      <p>Navigate, click, type, extract data, debug pages and more.</p>
      <div class="examples">
        <button class="example-btn" data-task="Abre google.com y busca 'noticias de hoy'">
          <span class="example-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
          <span>Search on Google</span>
          <svg class="example-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="example-btn" data-task="Toma una captura de pantalla y dime que ves">
          <span class="example-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span>
          <span>Analyze current page</span>
          <svg class="example-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="example-btn" data-task="Busca en mi historial la ultima pagina de YouTube que visite">
          <span class="example-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>
          <span>Search browser history</span>
          <svg class="example-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="example-btn" data-task="Lee los errores de la consola de esta pagina y ayudame a corregirlos">
          <span class="example-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></span>
          <span>Debug page errors</span>
          <svg class="example-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="example-btn" data-task="Lista todas las pestanas abiertas y dime el titulo de cada una">
          <span class="example-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 7h20M9 3v4"/></svg></span>
          <span>List all open tabs</span>
          <svg class="example-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Scheduled Tasks Panel -->
  <div class="scheduled-panel hidden" id="scheduledPanel">
    <div class="scheduled-header">
      <h3>Scheduled Tasks</h3>
      <button class="icon-btn" id="backToChat" title="Back to chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
    </div>

    <!-- New task form -->
    <div class="schedule-form">
      <div class="textarea-with-action">
        <textarea id="scheduleTask" rows="2" placeholder="Describe the task to run..."></textarea>
        <button class="btn-improve" id="improvePromptSidepanel" title="AI improves your prompt">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Improve
        </button>
      </div>
      <div class="schedule-row">
        <label>Every</label>
        <select id="scheduleInterval">
          <option value="5">5 min</option>
          <option value="15">15 min</option>
          <option value="30" selected>30 min</option>
          <option value="60">1 hour</option>
          <option value="360">6 hours</option>
          <option value="720">12 hours</option>
          <option value="1440">24 hours</option>
        </select>
        <button class="btn-add-schedule" id="addScheduleBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Add
        </button>
      </div>
    </div>

    <!-- Task list -->
    <div class="schedule-list" id="scheduleList">
      <div class="schedule-empty">No scheduled tasks yet</div>
    </div>
  </div>

  <!-- Input Area -->
  <footer class="input-area">
    <div class="input-glow"></div>
    <div class="input-previews" id="inputPreviews"></div>
    <div class="input-wrapper">
      <button class="attach-btn" id="attachBtn" title="Attach image">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <input type="file" id="fileInput" accept="image/*" multiple hidden />
      <textarea id="input" rows="1" placeholder="Describe a browser task..."></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button class="stop-btn hidden" id="stopBtn" title="Stop">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send</div>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
