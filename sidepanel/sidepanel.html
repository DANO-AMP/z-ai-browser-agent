<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Z AI Browser Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Z AI Agent</h1>
        <span class="status" id="status">
          <span class="status-dot"></span>
          <span class="status-text">Ready</span>
        </span>
      </div>
    </div>
    <div class="header-actions">
      <div class="model-wrapper">
        <select id="modelSelect" class="model-select">
          <option value="glm-5.1">GLM-5.1</option>
          <option value="glm-5-turbo">Turbo</option>
          <option value="glm-5">GLM-5</option>
          <option value="glm-4.5">GLM-4.5</option>
          <option value="glm-4.5-flash">Flash</option>
          <option value="glm-4.5-air">Air</option>
        </select>
      </div>
      <button class="icon-btn" id="clearBtn" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- Tab indicator -->
  <div class="tab-bar" id="tabBar">
    <span class="tab-indicator" id="tabLabel">Current tab</span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h2>What would you like me to do?</h2>
      <p>I can navigate, click, type, extract data, debug pages, and more.</p>
      <div class="examples">
        <button class="example-btn" data-task="Abre google.com y busca 'noticias de hoy'">
          <span class="example-icon">&#128269;</span>
          <span>Search on Google</span>
        </button>
        <button class="example-btn" data-task="Toma una captura de pantalla y dime que ves">
          <span class="example-icon">&#128247;</span>
          <span>Analyze current page</span>
        </button>
        <button class="example-btn" data-task="Busca en mi historial la ultima pagina de YouTube que visite">
          <span class="example-icon">&#128337;</span>
          <span>Search browser history</span>
        </button>
        <button class="example-btn" data-task="Lee los errores de la consola de esta pagina y ayudame a corregirlos">
          <span class="example-icon">&#128424;</span>
          <span>Debug page errors</span>
        </button>
        <button class="example-btn" data-task="Lista todas las pestañas abiertas y dime el titulo de cada una">
          <span class="example-icon">&#128194;</span>
          <span>List all open tabs</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="Describe a browser task..."></textarea>
      <button class="send-btn" id="sendBtn" title="Run">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
      <button class="stop-btn hidden" id="stopBtn" title="Stop">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send &middot; Shift+Enter for new line</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
