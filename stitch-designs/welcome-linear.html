<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Z AI Agent - Sidepanel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space_Grotesk:wght@500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#35343a",
                        "surface-container-lowest": "#0e0e13",
                        "on-secondary-fixed": "#13144a",
                        "on-tertiary-fixed": "#301400",
                        "on-secondary": "#292a60",
                        "primary": "#c0c1ff",
                        "on-secondary-container": "#b2b3f2",
                        "surface-container-high": "#2a292f",
                        "surface-container-highest": "#35343a",
                        "outline": "#908fa0",
                        "surface-container-low": "#1b1b20",
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-tertiary": "#4f2500",
                        "on-surface-variant": "#c7c4d7",
                        "tertiary-container": "#d97721",
                        "surface-container": "#1f1f25",
                        "surface-bright": "#39383e",
                        "on-primary": "#1000a9",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "background": "#131318",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface": "#131318",
                        "on-tertiary-container": "#452000",
                        "surface-tint": "#c0c1ff",
                        "error-container": "#93000a",
                        "secondary-fixed": "#e1e0ff",
                        "surface-dim": "#131318",
                        "on-background": "#e4e1e9",
                        "primary-container": "#8083ff",
                        "tertiary-fixed": "#ffdcc5",
                        "inverse-primary": "#494bd6",
                        "on-primary-container": "#0d0096",
                        "inverse-on-surface": "#303036",
                        "primary-fixed": "#e1e0ff",
                        "secondary": "#c0c1ff",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-primary-fixed": "#07006c",
                        "secondary-container": "#42447b",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-error": "#690005",
                        "on-secondary-fixed-variant": "#404178",
                        "on-surface": "#e4e1e9",
                        "outline-variant": "#464554",
                        "inverse-surface": "#e4e1e9",
                        "tertiary": "#ffb783",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 1.25rem;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131318;
            color: #e4e1e9;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2a292f;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col h-screen overflow-hidden selection:bg-primary/30 selection:text-primary">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-[#131318] border-none flex justify-between items-center px-4 py-3 w-full z-50">
<div class="flex items-center gap-2 cursor-pointer active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[#c0c1ff]" data-icon="auto_awesome">auto_awesome</span>
<span class="text-lg font-bold tracking-tighter text-[#e4e1e9] font-['Space_Grotesk']">Z AI Agent</span>
</div>
<div class="flex items-center gap-1 cursor-pointer hover:text-[#c0c1ff] transition-colors group">
<span class="font-['Space_Grotesk'] tracking-tight text-sm font-semibold text-[#c0c1ff]">GLM-5.1</span>
<span class="material-symbols-outlined text-[#9494a0] group-hover:text-[#c0c1ff] transition-colors text-sm" data-icon="expand_more">expand_more</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto custom-scrollbar px-6 flex flex-col items-center justify-start pt-12 pb-32">
<!-- Abstract Logo Hero -->
<div class="mb-10 relative">
<div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center border border-outline-variant/10 shadow-2xl relative z-10">
<span class="text-5xl font-headline font-bold text-primary tracking-tighter">Z</span>
</div>
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-primary/10 blur-[32px] rounded-full -z-10 scale-150"></div>
</div>
<h1 class="font-body text-xl font-medium mb-12 text-on-surface tracking-tight">What would you like me to do?</h1>
<!-- Vertical Action Buttons (Bento-lite) -->
<div class="w-full space-y-3 max-w-sm">
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all group active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="search">search</span>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Search on Google</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all group active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="pageview">pageview</span>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Analyze current page</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all group active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="history">history</span>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Search browser history</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all group active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="pest_control">pest_control</span>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Debug page errors</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-all group active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="tabs">tabs</span>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">List all open tabs</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>
<!-- Footer Input Area -->
<footer class="fixed bottom-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pt-12">
<div class="max-w-sm mx-auto flex flex-col gap-3">
<div class="relative group">
<div class="absolute -inset-0.5 bg-primary/20 rounded-xl blur opacity-0 group-focus-within:opacity-100 transition-opacity"></div>
<div class="relative bg-surface-container-lowest border-t border-outline-variant/10 rounded-xl p-3 flex items-center gap-3">
<button class="p-2 text-outline hover:text-on-surface transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="attach_file">attach_file</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-on-surface placeholder:text-outline/50 font-body" placeholder="Describe a browser task..." type="text"/>
<button class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-[0_0_15px_rgba(192,193,255,0.3)] hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl" data-icon="arrow_upward" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_upward</span>
</button>
</div>
</div>
<div class="flex justify-center">
<span class="text-[10px] font-label uppercase tracking-widest text-outline/40">Press Enter to send</span>
</div>
</div>
</footer>
<!-- Bottom Navigation Shell (Mobile Pivot Support) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl bg-[#0e0e13] border-t border-white/[0.05] shadow-[0_-4px_24px_rgba(0,0,0,0.4)] flex justify-around items-center px-6 py-2 pb-safe hidden">
<div class="flex flex-col items-center justify-center text-[#c0c1ff] bg-[#c0c1ff]/10 rounded-xl p-2 cursor-pointer transition-all active:scale-95 duration-150 ease-out">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9494a0] p-2 cursor-pointer transition-all hover:bg-white/[0.03] active:scale-95 duration-150 ease-out">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9494a0] p-2 cursor-pointer transition-all hover:bg-white/[0.03] active:scale-95 duration-150 ease-out">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</nav>
</body></html>
